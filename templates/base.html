<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}{{ SITE_NAME }} | خدمات توصيل ولوجستية موثوقة{% endblock %}</title>
<meta name="description" content="{% block description %}مؤسسة السكب المحجل للخدمات اللوجستية تقدم حلولاً احترافية لإدارة وتشغيل مندوبي التوصيل عبر أشهر تطبيقات التوصيل في المملكة العربية السعودية.{% endblock %}">
<meta name="keywords" content="السكب المحجل, خدمات لوجستية, توصيل, مندوبين توصيل, وظائف توصيل, هنقرستيشن, جاهز, كيتا, السعودية">
<meta name="robots" content="index, follow">
<meta name="author" content="{{ SITE_NAME }}">
<link rel="canonical" href="https://{{ SITE_DOMAIN }}/">

<meta property="og:type" content="website">
<meta property="og:title" content="{{ SITE_NAME }}">
<meta property="og:description" content="حلول احترافية لإدارة وتشغيل مندوبي التوصيل والخدمات اللوجستية.">
<meta property="og:url" content="https://{{ SITE_DOMAIN }}/">
<meta property="og:locale" content="ar_SA">

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">
<link rel="stylesheet" href="{% load static %}{% static 'landing/css/style.css' %}">
{% block extra_head %}{% endblock %}
</head>
<body>
{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script src="{% static 'landing/js/main.js' %}"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
