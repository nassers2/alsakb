services:
  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - static_data:/app/staticfiles
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alsakb}
      POSTGRES_USER: ${POSTGRES_USER:-alsakb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alsakb}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  static_data:
